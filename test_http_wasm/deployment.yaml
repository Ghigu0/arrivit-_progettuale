apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: wasmedge
handler: wasmedge

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: wasm-network-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wasm-network-test
  template:
    metadata:
      labels:
        app: wasm-network-test
      annotations:
        module.wasm.image/variant: compat-smart
    spec:
      runtimeClassName: wasmedge

      nodeSelector:
        kubernetes.io/hostname: worke

      containers:
        - name: wasm-network-test
          image: ghigu/attprog:test_wasm
          imagePullPolicy: IfNotPresent
