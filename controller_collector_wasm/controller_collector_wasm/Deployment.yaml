apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: wasmedge
handler: wasmedge

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-wasm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: controller-wasm
  template:
    metadata:
      labels:
        app: controller-wasm
      annotations:
        module.wasm.image/variant: compat-smart
    spec:
      runtimeClassName: wasmedge

      containers:
      - name: controller-wasm
        image: ghigu/attprog:controller_collector_wasm

    